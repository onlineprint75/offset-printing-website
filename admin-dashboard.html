<!DOCTYPE html>
<html lang="mn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPM Admin | Orders Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/Logo--ani-02.svg" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 30px;
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            min-width: 800px;
        }

        .product-table th,
        .product-table td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }

        .product-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }

        .product-table tr:hover {
            background-color: #fcfcfc;
        }

        .scan-link {
            display: inline-block;
            margin-top: 5px;
            font-size: 0.9em;
            color: var(--primary-color);
            text-decoration: none;
        }

        .scan-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>PPM Admin | Orders Dashboard</h2>
            <div id="connection-status" style="font-size: 0.9em; color: gray;">Connecting...</div>
        </div>

        <div class="table-responsive">
            <table class="product-table">
                <thead>
                    <tr>
                        <th width="140">Огноо</th>
                        <th>Захиалагч</th>
                        <th>Бүтээгдэхүүн</th>
                        <th>Хэмжээ / Тоо</th>
                        <th>Цаас</th>
                        <th width="120">Цаасны нийт үнэ</th>
                        <th>Төлөв</th>
                    </tr>
                </thead>
                <tbody id="orders-list-body">
                    <tr>
                        <td colspan="7" style="text-align:center; padding: 40px;">Loading orders...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase Configuration (Inlined for file:// protocol support)
        const firebaseConfig = {
            apiKey: "AIzaSyDIg6O2QhRT_9f_izoMfuoHEMOrxSThOjk",
            authDomain: "printing-admin-4fd08.firebaseapp.com",
            projectId: "printing-admin-4fd08",
            storageBucket: "printing-admin-4fd08.firebasestorage.app",
            messagingSenderId: "1076859337902",
            appId: "1:1076859337902:web:911c780fc4e6139519013f",
            measurementId: "G-Q50KVZX7RL"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const tbody = document.getElementById('orders-list-body');
        const statusDiv = document.getElementById('connection-status');

        // Create query for orders collection, sorted by newest first
        const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));

        console.log("Listening for orders...");

        // Real-time listener
        const unsubscribe = onSnapshot(q, (snapshot) => {
            statusDiv.textContent = `Live: ${snapshot.size} orders`;
            statusDiv.style.color = 'green';

            tbody.innerHTML = ''; // Clear current

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 40px; color: #666;">No orders found yet.</td></tr>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();

                // Format Date
                let dateDisplay = 'N/A';
                if (data.createdAt && data.createdAt.seconds) {
                    dateDisplay = new Date(data.createdAt.seconds * 1000).toLocaleString('mn-MN');
                }

                // Format Customer
                const custName = data.customer?.name || 'Unknown';
                const custPhone = data.customer?.phone || '';
                const custCompany = data.customer?.company ? `<br><small style="color:#666">${data.customer.company}</small>` : '';

                // Format Product
                const prodName = data.product?.name || 'Unknown Item';
                const prodDetails = data.product?.details || {};

                // Format Qty & Format
                const format = data.product?.format || prodDetails.Format || '-';
                const qty = data.product?.quantity || prodDetails.Quantity || 0;

                // Format Format Paper
                const paper = data.product?.paper || prodDetails.Paper || '-';

                // Format Cost (The Requirement: Bold GREEN)
                let costDisplay = '-';
                if (data.estimatedCost) {
                    // Assuming cost is number or string number
                    const costNum = parseInt(data.estimatedCost);
                    if (!isNaN(costNum)) {
                        costDisplay = `<span style="font-weight: bold; color: #28a745; font-size: 1.1em;">${costNum.toLocaleString()}₮</span>`;
                    } else {
                        costDisplay = `<span style="font-weight: bold; color: #28a745;">${data.estimatedCost}</span>`;
                    }
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-size: 0.9em; color: #666;">${dateDisplay}</td>
                    <td>
                        <strong>${custName}</strong><br>
                        <a href="tel:${custPhone}" style="color: #333; text-decoration:none;">${custPhone}</a>
                        ${custCompany}
                    </td>
                    <td>${prodName}</td>
                    <td>
                        <div style="font-weight:500;">${format}</div>
                        <div style="color: #666; font-size: 0.9em;">Qty: ${qty}</div>
                    </td>
                    <td style="font-size: 0.95em;">${paper}</td>
                    <td>${costDisplay}</td>
                    <td>
                        <span style="padding: 4px 8px; border-radius: 4px; background: #eef; color: #336; font-size: 0.85em;">
                            ${data.status || 'new'}
                        </span>
                    </td>
                `;
                tbody.appendChild(tr);
            });

        }, (error) => {
            console.error("Error getting orders: ", error);
            statusDiv.textContent = 'Connection Error';
            statusDiv.style.color = 'red';
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:red; padding: 20px;">Error loading data: ${error.message}<br>Check console for details.</td></tr>`;
        });

    </script>
</body>

</html>
